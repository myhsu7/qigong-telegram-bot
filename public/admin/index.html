<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f6f7fb;color:#1f2937}
    .layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
    .sidebar{background:#111827;color:#fff;padding:20px}
    .sidebar a{display:block;color:#fff;text-decoration:none;padding:10px 12px;border-radius:10px;margin-bottom:8px}
    .sidebar a.active,.sidebar a:hover{background:#374151}
    .content{padding:24px}
    .card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:20px}
    .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .kpi .label{color:#6b7280;font-size:13px;text-transform:uppercase;font-weight:700}
    .kpi .value{font-size:30px;font-weight:800;margin-top:8px;color:#0d6efd}
    .row{display:flex;justify-content:space-between;align-items:center;gap:12px}
    button{padding:10px 14px;border:0;background:#0d6efd;color:#fff;border-radius:10px;cursor:pointer}
    .ghost{background:#e5e7eb;color:#111827}
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2 style="margin-top:0;">Telegram Admin</h2>
      <a href="/admin" class="active">總覽</a>
      <a href="/admin/leaderboard">排行榜</a>
      <a href="/admin/method-analysis">功法分析</a>
    </aside>
    <main class="content">
      <div class="row">
        <h1 style="margin:0;">總覽</h1>
        <div>
          <button data-period="week">本週</button>
          <button data-period="month" class="ghost">本月</button>
          <button data-period="quarter" class="ghost">本季</button>
          <button data-period="year" class="ghost">本年</button>
        </div>
      </div>

      <div class="kpis" style="margin-top:20px;">
        <div class="card kpi"><div class="label">活躍人數</div><div id="activeUsers" class="value">0</div></div>
        <div class="card kpi"><div class="label">總打卡次數</div><div id="totalCheckins" class="value">0</div></div>
        <div class="card kpi"><div class="label">平均每日打卡</div><div id="avgDailyCheckins" class="value">0</div></div>
      </div>

      <div class="card">
        <h2 style="margin-top:0;">每日打卡趨勢</h2>
        <div style="position:relative;height:360px;"><canvas id="trendChart"></canvas></div>
      </div>
    </main>
  </div>
  <script>
    let currentPeriod = 'week';
    let chart;
    const buttons = [...document.querySelectorAll('[data-period]')];
    const setActive = () => buttons.forEach(btn => btn.className = btn.dataset.period === currentPeriod ? '' : 'ghost');
    const load = async () => {
      const res = await fetch(`/admin/api/overview?period=${currentPeriod}`);
      const data = await res.json();
      document.getElementById('activeUsers').textContent = data.kpis.activeUsers;
      document.getElementById('totalCheckins').textContent = data.kpis.totalCheckins;
      document.getElementById('avgDailyCheckins').textContent = data.kpis.avgDailyCheckins;
      if (chart) chart.destroy();
      chart = new Chart(document.getElementById('trendChart').getContext('2d'), {
        type: 'line',
        data: {
          labels: data.trend.map(d => d.date),
          datasets: [{ label: '每日打卡', data: data.trend.map(d => d.count), borderColor:'#0d6efd', backgroundColor:'rgba(13,110,253,.1)', fill:true, tension:.2 }]
        },
        options: { responsive:true, maintainAspectRatio:false, scales:{ y:{ beginAtZero:true, ticks:{ precision:0 }}}}
      });
    };
    buttons.forEach(btn => btn.onclick = () => { currentPeriod = btn.dataset.period; setActive(); load(); });
    setActive();
    load();
  </script>
</body>
</html>
