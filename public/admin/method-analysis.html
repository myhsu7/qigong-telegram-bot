<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram 功法分析</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f6f7fb; color: #1f2937; }
    .layout { display:grid; grid-template-columns:240px 1fr; min-height:100vh; }
    .sidebar { background:#111827; color:#fff; padding:20px; }
    .sidebar a { display:block; color:#fff; text-decoration:none; padding:10px 12px; border-radius:10px; margin-bottom:8px; }
    .sidebar a.active, .sidebar a:hover { background:#374151; }
    .content { padding:24px; }
    .container { max-width: 1100px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    .row { display:flex; gap:10px; align-items:center; }
    input { flex:1; padding:10px 12px; border:1px solid #d1d5db; border-radius:10px; }
    button { padding:10px 14px; border:0; background:#0d6efd; color:#fff; border-radius:10px; cursor:pointer; }
    table { width:100%; border-collapse: collapse; }
    th, td { text-align:left; padding:8px; border-bottom:1px solid #eee; }
    .list a { display:block; padding:8px 10px; border:1px solid #eee; border-radius:8px; margin-bottom:6px; text-decoration:none; color:#111; }
    .muted { color:#6b7280; }
    .segmented { display:inline-flex; background:#eef2ff; border-radius:999px; padding:4px; gap:4px; }
    .segmented button { background:transparent; color:#4338ca; border-radius:999px; }
    .segmented button.active { background:#4338ca; color:#fff; }
    .journal-list { display:flex; flex-direction:column; gap:12px; }
    .journal-entry { border:1px solid #e5e7eb; border-radius:14px; padding:16px; background:#fff; }
    .journal-date { font-weight:700; margin-bottom:10px; }
    .tag-group { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
    .tag { display:inline-flex; align-items:center; border-radius:999px; padding:6px 10px; font-size:12px; }
    .tag.group { background:#ede9fe; color:#6d28d9; }
    .tag.leaf { background:#ecfeff; color:#0f766e; }
    .note-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .note-box { background:#f8fafc; border-radius:12px; padding:12px; }
    .note-label { color:#6b7280; font-size:12px; text-transform:uppercase; font-weight:700; margin-bottom:6px; }
    @media (max-width: 900px) {
      .layout { grid-template-columns:1fr; }
      .sidebar { padding-bottom:12px; }
      .grid { grid-template-columns: 1fr; }
      .note-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2 style="margin-top:0;">Telegram Admin</h2>
      <a href="/telegram/admin">總覽</a>
      <a href="/telegram/admin/leaderboard">排行榜</a>
      <a href="/telegram/admin/method-analysis" class="active">功法分析</a>
    </aside>
    <main class="content">
      <div class="container">
        <h1 style="margin-top:0;">Telegram 功法分析</h1>
        <div class="grid">
          <div class="card">
            <div class="row" style="justify-content:space-between; margin-bottom:12px; flex-wrap:wrap;">
              <h2 style="margin:0;">全體近 30 / 90 天功法分布</h2>
              <div class="row" style="flex-wrap:wrap;">
                <div class="segmented">
                  <button id="modeGrouped" class="active" type="button">父功法</button>
                  <button id="modeLeaf" type="button">葉子功法</button>
                </div>
                <button id="period30" type="button">30天</button>
                <button id="period90" type="button">90天</button>
              </div>
            </div>
            <div style="position:relative; height:360px;"><canvas id="communityChart"></canvas></div>
            <div id="communityMeta" class="muted" style="margin-top:10px;"></div>
          </div>
          <div class="card">
            <h2 style="margin-top:0;">搜尋學員</h2>
            <div class="row" style="margin-bottom:12px;">
              <input id="query" placeholder="輸入姓名或 username" />
              <button id="search" type="button">搜尋</button>
            </div>
            <div id="results" class="list"></div>
          </div>
        </div>

        <div class="card" style="margin-top:20px;">
          <h2 id="userTitle" style="margin-top:0;">個人分析</h2>
          <div class="grid">
            <div>
              <h3>最近 30 天</h3>
              <table id="table30"></table>
            </div>
            <div>
              <h3>最近 90 天</h3>
              <table id="table90"></table>
            </div>
          </div>
        </div>

        <div class="card" style="margin-top:20px;">
          <h2 style="margin-top:0;">最近心得與身體感受</h2>
          <div id="journalList" class="journal-list">
            <div class="muted">請先搜尋並選擇學員。</div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    let chart;
    let currentMode = 'grouped';
    let currentPeriod = '30d';
    let communityData = null;
    let currentUserData = null;

    const communityMeta = document.getElementById('communityMeta');
    const escapeHtml = (value) => String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    const getModeItems = (analysis) => {
      if (!analysis) return [];
      return currentMode === 'grouped'
        ? (analysis.groupMethods || analysis.methods || [])
        : (analysis.leafMethods || []);
    };

    const getModeTotal = (analysis) => {
      if (!analysis) return 0;
      return currentMode === 'grouped'
        ? (analysis.totalMatchedGroupDays || analysis.totalMatchedMethodDays || 0)
        : (analysis.totalMatchedLeafDays || 0);
    };

    const setModeButtons = () => {
      document.getElementById('modeGrouped').classList.toggle('active', currentMode === 'grouped');
      document.getElementById('modeLeaf').classList.toggle('active', currentMode === 'leaf');
    };

    const renderMethodTable = (el, analysis) => {
      const items = getModeItems(analysis);
      if (!items.length) {
        el.innerHTML = '<tr><td class="muted">無資料</td></tr>';
        return;
      }
      let html = '<thead><tr><th>功法</th><th>天數</th><th>配比</th><th>出席率</th></tr></thead><tbody>';
      items.forEach((m) => {
        html += `<tr><td>${m.methodName}</td><td>${m.matchedDays}</td><td>${(m.compositionRatio * 100).toFixed(1)}%</td><td>${(m.attendanceRatio * 100).toFixed(1)}%</td></tr>`;
      });
      html += '</tbody>';
      el.innerHTML = html;
    };

    const renderCommunitySummary = () => {
      const items = getModeItems(communityData);
      const labels = items.map((m) => m.methodName);
      const values = items.map((m) => m.matchedDays);
      const colors = ['#0d6efd','#198754','#ffc107','#fd7e14','#dc3545','#6f42c1','#20c997','#14b8a6','#8b5cf6','#f97316'];
      if (chart) chart.destroy();
      chart = new Chart(document.getElementById('communityChart').getContext('2d'), {
        type: 'doughnut',
        data: { labels, datasets: [{ data: values, backgroundColor: colors.slice(0, labels.length) }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
      });

      const modeLabel = currentMode === 'grouped' ? '父功法命中總天數' : '葉子功法命中總天數';
      communityMeta.textContent = `總打卡天數：${communityData.totalCheckinDays}｜${modeLabel}：${getModeTotal(communityData)}`;
    };

    const renderUserTables = () => {
      renderMethodTable(document.getElementById('table30'), currentUserData?.analysis30 || null);
      renderMethodTable(document.getElementById('table90'), currentUserData?.analysis90 || null);
    };

    const renderJournal = (entries) => {
      const journalList = document.getElementById('journalList');
      if (!entries || entries.length === 0) {
        journalList.innerHTML = '<div class="muted">目前沒有可顯示的心得或身體感受。</div>';
        return;
      }

      journalList.innerHTML = entries.map((entry) => {
        const groupedTags = (entry.groupedMethods || []).map((name) => `<span class="tag group">${escapeHtml(name)}</span>`).join('');
        const leafTags = (entry.leafMethods || []).map((name) => `<span class="tag leaf">${escapeHtml(name)}</span>`).join('');
        const reflectionText = escapeHtml(entry.reflectionNote || '未填寫');
        const bodyFeelingText = escapeHtml(entry.bodyFeelingNote || '未填寫');

        return `
          <div class="journal-entry">
            <div class="journal-date">${escapeHtml(entry.date)}</div>
            <div class="tag-group">${groupedTags}</div>
            <div class="tag-group">${leafTags}</div>
            <div class="note-grid">
              <div class="note-box">
                <div class="note-label">練功心得</div>
                <div>${reflectionText}</div>
              </div>
              <div class="note-box">
                <div class="note-label">身體感受</div>
                <div>${bodyFeelingText}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    };

    const loadSummary = async (period) => {
      currentPeriod = period;
      const res = await fetch(`/telegram/admin/api/method-analysis/summary?period=${period}`);
      communityData = await res.json();
      renderCommunitySummary();
    };

    document.getElementById('period30').onclick = () => loadSummary('30d');
    document.getElementById('period90').onclick = () => loadSummary('90d');

    document.getElementById('modeGrouped').onclick = () => {
      currentMode = 'grouped';
      setModeButtons();
      if (communityData) renderCommunitySummary();
      renderUserTables();
    };

    document.getElementById('modeLeaf').onclick = () => {
      currentMode = 'leaf';
      setModeButtons();
      if (communityData) renderCommunitySummary();
      renderUserTables();
    };

    document.getElementById('search').onclick = async () => {
      const q = document.getElementById('query').value.trim();
      const res = await fetch(`/telegram/admin/api/method-analysis/search-users?q=${encodeURIComponent(q)}`);
      const users = await res.json();
      const results = document.getElementById('results');
      results.innerHTML = '';
      users.forEach((u) => {
        const a = document.createElement('a');
        a.href = '#';
        a.textContent = u.displayName;
        a.onclick = async (e) => {
          e.preventDefault();
          document.getElementById('userTitle').textContent = `個人分析：${u.displayName}`;
          const userRes = await fetch(`/telegram/admin/api/method-analysis/user?userId=${u.telegramUserId}`);
          currentUserData = await userRes.json();
          renderUserTables();
          renderJournal(currentUserData.journal || []);
        };
        results.appendChild(a);
      });
    };

    document.getElementById('query').addEventListener('keypress', (event) => {
      if (event.key === 'Enter') {
        document.getElementById('search').click();
      }
    });

    setModeButtons();
    loadSummary(currentPeriod);

    const params = new URLSearchParams(window.location.search);
    const queryUserId = params.get('userId');
    const queryName = params.get('name');
    if (queryUserId) {
      const displayName = queryName || '使用者';
      document.getElementById('userTitle').textContent = `個人分析：${displayName}`;
      fetch(`/telegram/admin/api/method-analysis/user?userId=${encodeURIComponent(queryUserId)}`)
        .then((res) => res.json())
        .then((data) => {
          currentUserData = data;
          renderUserTables();
          renderJournal(currentUserData.journal || []);
        })
        .catch((err) => {
          console.error('[method-analysis] auto-load failed', err);
        });
    }
   </script>
</body>
</html>
