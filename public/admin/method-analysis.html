<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram 功法分析</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f6f7fb; color: #1f2937; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    .row { display:flex; gap:10px; align-items:center; }
    input { flex:1; padding:10px 12px; border:1px solid #d1d5db; border-radius:10px; }
    button { padding:10px 14px; border:0; background:#0d6efd; color:#fff; border-radius:10px; cursor:pointer; }
    table { width:100%; border-collapse: collapse; }
    th, td { text-align:left; padding:8px; border-bottom:1px solid #eee; }
    .list a { display:block; padding:8px 10px; border:1px solid #eee; border-radius:8px; margin-bottom:6px; text-decoration:none; color:#111; }
    .muted { color:#6b7280; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Telegram 功法分析</h1>
    <div class="grid">
      <div class="card">
        <div class="row" style="justify-content:space-between; margin-bottom:12px;">
          <h2 style="margin:0;">全體近 30 / 90 天功法分布</h2>
          <div class="row">
            <button id="period30">30天</button>
            <button id="period90">90天</button>
          </div>
        </div>
        <div style="position:relative; height:360px;"><canvas id="communityChart"></canvas></div>
        <div id="communityMeta" class="muted" style="margin-top:10px;"></div>
      </div>
      <div class="card">
        <h2 style="margin-top:0;">搜尋學員</h2>
        <div class="row" style="margin-bottom:12px;">
          <input id="query" placeholder="輸入姓名或 username" />
          <button id="search">搜尋</button>
        </div>
        <div id="results" class="list"></div>
      </div>
    </div>

    <div class="card" style="margin-top:20px;">
      <h2 id="userTitle" style="margin-top:0;">個人分析</h2>
      <div class="grid">
        <div>
          <h3>最近 30 天</h3>
          <table id="table30"></table>
        </div>
        <div>
          <h3>最近 90 天</h3>
          <table id="table90"></table>
        </div>
      </div>
    </div>
  </div>
  <script>
    let chart;
    const communityMeta = document.getElementById('communityMeta');
    const renderMethodTable = (el, analysis) => {
      if (!analysis || !analysis.methods || analysis.methods.length === 0) {
        el.innerHTML = '<tr><td class="muted">無資料</td></tr>';
        return;
      }
      let html = '<thead><tr><th>功法</th><th>天數</th><th>配比</th><th>出席率</th></tr></thead><tbody>';
      analysis.methods.forEach((m) => {
        html += `<tr><td>${m.methodName}</td><td>${m.matchedDays}</td><td>${(m.compositionRatio*100).toFixed(1)}%</td><td>${(m.attendanceRatio*100).toFixed(1)}%</td></tr>`;
      });
      html += '</tbody>';
      el.innerHTML = html;
    };

    const loadSummary = async (period) => {
      const res = await fetch(`/telegram/admin/api/method-analysis/summary?period=${period}`);
      const data = await res.json();
      const labels = data.methods.map((m) => m.methodName);
      const values = data.methods.map((m) => m.matchedDays);
      const colors = ['#0d6efd','#198754','#ffc107','#fd7e14','#dc3545','#6f42c1','#20c997'];
      if (chart) chart.destroy();
      chart = new Chart(document.getElementById('communityChart').getContext('2d'), {
        type: 'doughnut',
        data: { labels, datasets: [{ data: values, backgroundColor: colors.slice(0, labels.length) }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
      });
      communityMeta.textContent = `總打卡天數：${data.totalCheckinDays}｜功法命中總天數：${data.totalMatchedMethodDays}`;
    };

    document.getElementById('period30').onclick = () => loadSummary('30d');
    document.getElementById('period90').onclick = () => loadSummary('90d');

    document.getElementById('search').onclick = async () => {
      const q = document.getElementById('query').value.trim();
      const res = await fetch(`/telegram/admin/api/method-analysis/search-users?q=${encodeURIComponent(q)}`);
      const users = await res.json();
      const results = document.getElementById('results');
      results.innerHTML = '';
      users.forEach((u) => {
        const a = document.createElement('a');
        a.href = '#';
        a.textContent = u.displayName;
        a.onclick = async (e) => {
          e.preventDefault();
          document.getElementById('userTitle').textContent = `個人分析：${u.displayName}`;
          const res = await fetch(`/telegram/admin/api/method-analysis/user?userId=${u.telegramUserId}`);
          const data = await res.json();
          renderMethodTable(document.getElementById('table30'), data.analysis30);
          renderMethodTable(document.getElementById('table90'), data.analysis90);
        };
        results.appendChild(a);
      });
    };

    loadSummary('30d');
  </script>
</body>
</html>
