<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>氣功打卡</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f6f7fb; color: #1f2937; }
    .container { max-width: 640px; margin: 0 auto; padding: 20px; }
    .card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,.08); margin-bottom: 16px; }
    h1 { font-size: 24px; margin: 0 0 8px; }
    h2 { font-size: 16px; margin: 0 0 12px; }
    .muted { color: #6b7280; font-size: 14px; }
    .method { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
    textarea { width: 100%; min-height: 96px; border: 1px solid #d1d5db; border-radius: 10px; padding: 12px; font-size: 14px; box-sizing: border-box; }
    button { width: 100%; background: #0d6efd; color: #fff; border: 0; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; }
    button:disabled { background: #9ca3af; }
    .hint { background: #eff6ff; color: #1d4ed8; padding: 10px 12px; border-radius: 10px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>今日打卡</h1>
      <p class="muted">MVP 頁面骨架。下一步會接上 Telegram Web App 身分驗證與 PostgreSQL 儲存。</p>
      <div class="hint">同一天已打卡時，未來這裡會自動載入已填內容，並允許覆蓋更新。</div>
    </div>

    <div class="card">
      <h2>今日功法（可複選）</h2>
      <label class="method"><input type="checkbox" name="methods" value="大雁功"> 大雁功</label>
      <label class="method"><input type="checkbox" name="methods" value="回春功"> 回春功</label>
      <label class="method"><input type="checkbox" name="methods" value="龜壽功"> 龜壽功</label>
      <label class="method"><input type="checkbox" name="methods" value="正陽功"> 正陽功</label>
      <label class="method"><input type="checkbox" name="methods" value="神奇晃海功"> 神奇晃海功</label>
      <label class="method"><input type="checkbox" name="methods" value="和氣舒壓法"> 和氣舒壓法</label>
      <label class="method"><input type="checkbox" name="methods" value="蓮花"> 蓮花</label>
    </div>

    <div class="card">
      <h2>練功心得（選填）</h2>
      <textarea placeholder="今天練功的心得..."></textarea>
    </div>

    <div class="card">
      <h2>身體感受（選填）</h2>
      <textarea placeholder="今天身體有什麼感受..."></textarea>
    </div>

    <button type="button" disabled>完成打卡（MVP 下一步接後端）</button>
  </div>
</body>
</html>
