<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>氣功打卡</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f6f7fb; color: #1f2937; }
    .container { max-width: 640px; margin: 0 auto; padding: 20px; }
    .card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,.08); margin-bottom: 16px; }
    h1 { font-size: 24px; margin: 0 0 8px; }
    h2 { font-size: 16px; margin: 0 0 12px; }
    .muted { color: #6b7280; font-size: 14px; }
    .method-group { border-bottom: 1px solid #f3f4f6; padding: 6px 0; }
    .method-group:last-child { border-bottom: 0; }
    .method-row { display: flex; align-items: center; gap: 10px; }
    .method-label { display: flex; align-items: center; gap: 10px; flex: 1; padding: 8px 0; }
    .toggle-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; color: #374151; font-size: 18px; line-height: 1; padding: 0; flex-shrink: 0; }
    .toggle-spacer { width: 30px; height: 30px; flex-shrink: 0; }
    .child-list { margin-left: 40px; padding-bottom: 4px; }
    .child-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
    .child-label { display: flex; align-items: center; gap: 10px; flex: 1; color: #4b5563; }
    .method-hint { color: #9ca3af; font-size: 12px; }
    textarea { width: 100%; min-height: 96px; border: 1px solid #d1d5db; border-radius: 10px; padding: 12px; font-size: 14px; box-sizing: border-box; }
    button { width: 100%; background: #0d6efd; color: #fff; border: 0; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; }
    button:disabled { background: #9ca3af; }
    .hint { background: #eff6ff; color: #1d4ed8; padding: 10px 12px; border-radius: 10px; font-size: 14px; }
    .status { margin-top: 12px; font-size: 14px; }
    .error { color: #b91c1c; }
    .success { color: #166534; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>今日打卡</h1>
      <p class="muted">請勾選今天練習的功法，並可選填心得與身體感受。</p>
      <div class="hint" id="todayStatus">正在載入今日打卡資料...</div>
    </div>

    <div class="card">
      <h2>今日功法（可複選）</h2>
      <div id="methodsContainer"></div>
    </div>

    <div class="card">
      <h2>練功心得（選填）</h2>
      <textarea id="reflectionNote" placeholder="今天練功的心得..."></textarea>
    </div>

    <div class="card">
      <h2>身體感受（選填）</h2>
      <textarea id="bodyFeelingNote" placeholder="今天身體有什麼感受..."></textarea>
    </div>

    <button type="button" id="submitButton">完成打卡</button>
    <div id="submitStatus" class="status"></div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const methodsContainer = document.getElementById('methodsContainer');
    const reflectionNote = document.getElementById('reflectionNote');
    const bodyFeelingNote = document.getElementById('bodyFeelingNote');
    const submitButton = document.getElementById('submitButton');
    const submitStatus = document.getElementById('submitStatus');
    const todayStatus = document.getElementById('todayStatus');
    let practiceMethods = [];
    let selectedMethodIds = new Set();
    let expandedMethodIds = new Set();

    const initData = tg?.initData || '';

    const setStatus = (el, message, className = '') => {
      el.textContent = message;
      el.className = `status ${className}`.trim();
    };

    const apiFetch = async (url, options = {}) => {
      const headers = new Headers(options.headers || {});
      headers.set('x-telegram-init-data', initData);
      if (!headers.has('Content-Type') && options.method && options.method !== 'GET') {
        headers.set('Content-Type', 'application/json');
      }
      const res = await fetch(url, { ...options, headers });
      if (!res.ok) {
        const body = await res.json().catch(() => ({ error: 'Request failed' }));
        throw new Error(body.error || 'Request failed');
      }
      return res.json();
    };

    const normalizeSelectedIds = (methods, selectedIds) => {
      const normalized = new Set();
      const incoming = new Set(selectedIds);

      methods.forEach((method) => {
        if (method.children && method.children.length > 0) {
          if (incoming.has(method.id)) {
            method.children.forEach((child) => normalized.add(child.id));
          }
          method.children.forEach((child) => {
            if (incoming.has(child.id)) normalized.add(child.id);
          });
          return;
        }

        if (incoming.has(method.id)) {
          normalized.add(method.id);
        }
      });

      return normalized;
    };

    const getParentSelectionState = (method) => {
      if (!method.children || method.children.length === 0) {
        return { checked: selectedMethodIds.has(method.id), indeterminate: false };
      }

      const selectedCount = method.children.filter((child) => selectedMethodIds.has(child.id)).length;
      return {
        checked: selectedCount === method.children.length,
        indeterminate: selectedCount > 0 && selectedCount < method.children.length
      };
    };

    const redrawMethods = () => {
      methodsContainer.innerHTML = '';
      practiceMethods.forEach((method) => {
        const group = document.createElement('div');
        group.className = 'method-group';

        const row = document.createElement('div');
        row.className = 'method-row';

        if (method.children && method.children.length > 0) {
          const toggleButton = document.createElement('button');
          toggleButton.type = 'button';
          toggleButton.className = 'toggle-btn';
          toggleButton.dataset.action = 'toggle';
          toggleButton.dataset.methodId = String(method.id);
          toggleButton.textContent = expandedMethodIds.has(method.id) ? '−' : '+';
          row.appendChild(toggleButton);
        } else {
          const spacer = document.createElement('span');
          spacer.className = 'toggle-spacer';
          row.appendChild(spacer);
        }

        const label = document.createElement('label');
        label.className = 'method-label';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.dataset.action = 'parent-check';
        checkbox.dataset.methodId = String(method.id);

        const state = getParentSelectionState(method);
        checkbox.checked = state.checked;
        checkbox.indeterminate = state.indeterminate;

        const textWrap = document.createElement('div');
        textWrap.innerHTML = method.children && method.children.length > 0
          ? `${method.nameZh} <span class="method-hint">勾選即全選子招式</span>`
          : method.nameZh;

        label.appendChild(checkbox);
        label.appendChild(textWrap);
        row.appendChild(label);
        group.appendChild(row);

        if (method.children && method.children.length > 0 && expandedMethodIds.has(method.id)) {
          const childList = document.createElement('div');
          childList.className = 'child-list';

          method.children.forEach((child) => {
            const childRow = document.createElement('div');
            childRow.className = 'child-row';

            const childLabel = document.createElement('label');
            childLabel.className = 'child-label';

            const childCheckbox = document.createElement('input');
            childCheckbox.type = 'checkbox';
            childCheckbox.dataset.action = 'child-check';
            childCheckbox.dataset.methodId = String(child.id);
            childCheckbox.checked = selectedMethodIds.has(child.id);

            const childText = document.createElement('span');
            childText.textContent = child.nameZh;

            childLabel.appendChild(childCheckbox);
            childLabel.appendChild(childText);
            childRow.appendChild(childLabel);
            childList.appendChild(childRow);
          });

          group.appendChild(childList);
        }

        methodsContainer.appendChild(group);
      });
    };

    const getSelectedMethodIds = () => {
      const ids = [];
      practiceMethods.forEach((method) => {
        if (method.children && method.children.length > 0) {
          method.children.forEach((child) => {
            if (selectedMethodIds.has(child.id)) ids.push(child.id);
          });
        } else if (selectedMethodIds.has(method.id)) {
          ids.push(method.id);
        }
      });
      return ids;
    };

    const renderMethods = (methods, selectedIds = []) => {
      practiceMethods = methods;
      selectedMethodIds = normalizeSelectedIds(methods, selectedIds);
      expandedMethodIds = new Set(methods.filter((method) => {
        if (!method.children || method.children.length === 0) return false;
        return method.children.some((child) => selectedMethodIds.has(child.id)) || selectedIds.includes(method.id);
      }).map((method) => method.id));
      redrawMethods();
    };

    methodsContainer.addEventListener('click', (event) => {
      const toggleButton = event.target.closest('button[data-action="toggle"]');
      if (!toggleButton) return;

      const methodId = Number(toggleButton.dataset.methodId);
      if (expandedMethodIds.has(methodId)) {
        expandedMethodIds.delete(methodId);
      } else {
        expandedMethodIds.add(methodId);
      }
      redrawMethods();
    });

    methodsContainer.addEventListener('change', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) return;

      if (target.dataset.action === 'parent-check') {
        const methodId = Number(target.dataset.methodId);
        const method = practiceMethods.find((item) => item.id === methodId);
        if (!method) return;

        if (method.children && method.children.length > 0) {
          method.children.forEach((child) => {
            if (target.checked) selectedMethodIds.add(child.id);
            else selectedMethodIds.delete(child.id);
          });
        } else if (target.checked) {
          selectedMethodIds.add(method.id);
        } else {
          selectedMethodIds.delete(method.id);
        }

        redrawMethods();
        return;
      }

      if (target.dataset.action === 'child-check') {
        const methodId = Number(target.dataset.methodId);
        if (target.checked) selectedMethodIds.add(methodId);
        else selectedMethodIds.delete(methodId);
        redrawMethods();
      }
    });

    const load = async () => {
      try {
        const [methodsResp, todayResp] = await Promise.all([
          apiFetch('/telegram/api/webapp/practice-methods'),
          apiFetch('/telegram/api/webapp/checkin/today')
        ]);

        renderMethods(methodsResp.methods, todayResp.selectedMethodIds);
        reflectionNote.value = todayResp.reflectionNote || '';
        bodyFeelingNote.value = todayResp.bodyFeelingNote || '';

        todayStatus.textContent = todayResp.alreadyCheckedIn
          ? '你今天已打卡，可修改今日內容後重新送出。'
          : '今天尚未打卡，請完成以下內容後送出。';
      } catch (error) {
        todayStatus.textContent = `載入失敗：${error.message}`;
        todayStatus.className = 'hint error';
      }
    };

    submitButton.addEventListener('click', async () => {
      const methodIds = getSelectedMethodIds();
      if (methodIds.length === 0) {
        setStatus(submitStatus, '請至少勾選一個功法。', 'error');
        return;
      }

      submitButton.disabled = true;
      setStatus(submitStatus, '正在儲存打卡資料...');

      try {
        const result = await apiFetch('/telegram/api/webapp/checkin', {
          method: 'POST',
          body: JSON.stringify({
            methodIds,
            reflectionNote: reflectionNote.value,
            bodyFeelingNote: bodyFeelingNote.value,
            initData
          })
        });

        const streakText = result.stats ? `｜連續 ${result.stats.currentStreak} 天｜總計 ${result.stats.totalCheckins} 天` : '';
        const badgeText = result.unlockedBadges && result.unlockedBadges.length > 0
          ? `｜解鎖：${result.unlockedBadges.map(b => `${b.emoji} ${b.name}`).join('、')}`
          : '';
        setStatus(submitStatus, `打卡成功：${result.selectedMethods.join('、')}${streakText}${badgeText}`, 'success');
        todayStatus.textContent = '今天的打卡內容已儲存，你可以再次修改後重新送出。';
        if (tg?.HapticFeedback) {
          tg.HapticFeedback.notificationOccurred('success');
        }
      } catch (error) {
        setStatus(submitStatus, `儲存失敗：${error.message}`, 'error');
      } finally {
        submitButton.disabled = false;
      }
    });

    load();
  </script>
</body>
</html>
